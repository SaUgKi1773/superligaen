name: Nightly pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # 23:00 UTC = midnight Danish time (CET) — after matches finish
  workflow_dispatch:
    inputs:
      full_load:
        description: "Set to 'true' to run a full historical load"
        required: false
        default: "false"
      league:
        description: "League ID (e.g. 119). Leave empty to load all leagues."
        required: false
        default: ""
      season:
        description: "Season year for full load (e.g. 2025). Leave empty to load all seasons."
        required: false
        default: ""
      lookback:
        description: "Days to look back for incremental runs (default: 3)"
        required: false
        default: "3"
      target_db:
        description: "Target MotherDuck database (e.g. superligaen). Leave empty to use default (superligaen)."
        required: false
        default: ""

jobs:
  # ---------------------------------------------------------------------------
  # Bronze — ingest raw API data
  # ---------------------------------------------------------------------------
  ingest:
    name: Bronze ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max — covers one full season load

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: python ingestion/run.py --lookback ${{ github.event.inputs.lookback || '3' }}

      - name: Run ingestion (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TARGET_DB: ${{ github.event.inputs.target_db || 'superligaen' }}
        run: |
          ARGS="--full-load"
          [ -n "${{ github.event.inputs.league }}" ] && ARGS="$ARGS --league ${{ github.event.inputs.league }}"
          [ -n "${{ github.event.inputs.season }}" ] && ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          python ingestion/run.py $ARGS

  # ---------------------------------------------------------------------------
  # Silver — transform bronze JSON into structured tables (dbt)
  # ---------------------------------------------------------------------------
  transform:
    name: Silver transformation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ingest  # only runs if ingest succeeds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Run silver (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt run --select silver.* --target $TARGET --vars '{"lookback_days": ${{ github.event.inputs.lookback || '3' }}}'

      - name: Run silver (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          if [ -n "${{ github.event.inputs.season }}" ]; then
            dbt run --select silver.* --target $TARGET --vars '{"season": ${{ github.event.inputs.season }}}'
          else
            dbt run --select silver.* --target $TARGET --full-refresh
          fi

  # ---------------------------------------------------------------------------
  # Gold — build Kimball dimensional model (dbt)
  # ---------------------------------------------------------------------------
  gold:
    name: Gold transformation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: transform  # only runs if silver succeeds

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Build gold (incremental)
        if: ${{ github.event.inputs.full_load != 'true' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt run --select gold.* --target $TARGET --vars '{"lookback_days": ${{ github.event.inputs.lookback || '3' }}}'

      - name: Build gold (full load)
        if: ${{ github.event.inputs.full_load == 'true' }}
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          if [ -n "${{ github.event.inputs.season }}" ]; then
            dbt run --select gold.* --target $TARGET --vars '{"season": ${{ github.event.inputs.season }}}'
          else
            dbt run --select gold.* --target $TARGET --full-refresh
          fi

  # ---------------------------------------------------------------------------
  # DQ tests — run after gold, block publish if any test fails
  # ---------------------------------------------------------------------------
  dq_tests:
    name: DQ tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gold

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Run DQ tests
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt test --target $TARGET

      - name: Check source freshness
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt source freshness --target $TARGET

  # ---------------------------------------------------------------------------
  # Dashboard — push to publish_dashboard/vercel to trigger Vercel rebuild
  # ---------------------------------------------------------------------------
  publish:
    name: Publish dashboard (Vercel)
    runs-on: ubuntu-latest
    needs: dq_tests
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Vercel deploy branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -B publish_dashboard/vercel origin/main
          git commit --allow-empty -m "chore: nightly data refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin publish_dashboard/vercel --force
