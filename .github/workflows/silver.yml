name: Silver transformation

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Set to 'true' to fully rebuild all silver tables from bronze"
        required: false
        default: "false"
      target_db:
        description: "Target MotherDuck database (superligaen or superligaen_dev). Default: superligaen."
        required: false
        default: ""

jobs:
  transform:
    name: Silver transformation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: Load seeds
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          dbt seed --target $TARGET

      - name: Run silver
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          TARGET=$([ "${{ github.event.inputs.target_db || 'superligaen' }}" = "superligaen" ] && echo "prod" || echo "dev")
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            dbt run --select silver.* --target $TARGET --full-refresh
          else
            dbt run --select silver.* --target $TARGET
          fi
