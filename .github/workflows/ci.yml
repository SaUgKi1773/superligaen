name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile ingestion/sportmonks/run.py
          python -m py_compile ingestion/sportmonks/api.py
          python -m py_compile ingestion/sportmonks/db.py
          python -m py_compile ingestion/sportmonks/config.py
          python -m py_compile ingestion/sportmonks/engine.py

      - name: dbt deps
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: dbt compile --target dev
