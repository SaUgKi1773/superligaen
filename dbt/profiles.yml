superligaen:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../superligaen_dev.duckdb') }}"
      schema: silver
      settings:
        preserve_insertion_order: false
    prod:
      type: duckdb
      path: "md:superligaen?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
      schema: silver
